services:
  honeysentinel:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - path: .env
        required: false
    volumes:
      - ${HONEYSENTINEL_CONFIG:-./config.example.yaml}:/app/config.yaml:ro
      - ./data:/app/data
    ports:
      - "8000:8000"
      - "12222:12222"
      - "12323:12323"
      - "12525:12525"
      - "16379:16379"
      - "19000:19000"
      - "18080:18080"
      - "33890:33890"
