db_path: ./data/honeysentinel.db
security:
  api_key: changeme
privacy:
  store_tcp_payload_preview: false
  tcp_payload_preview_bytes: 256
alerts:
  email:
    enabled: false
    smtp_host: smtp.example.com
    smtp_port: 587
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"
    from_addr: "honeysentinel@example.com"
    to_addrs:
      - "security@example.com"
    use_starttls: true
  twilio:
    enabled: false
    account_sid: "${TWILIO_ACCOUNT_SID}"
    auth_token: "${TWILIO_AUTH_TOKEN}"
    from_number: "+15551234567"
    to_numbers:
      - "+15557654321"
    min_severity: "high"
  webhook:
    enabled: false
    url: ""
  syslog:
    enabled: false
    host: 127.0.0.1
    port: 5514
ingest:
  suricata:
    enabled: false
    eve_path: /var/log/suricata/eve.json
    max_line_bytes: 65536
  zeek:
    enabled: false
    log_dir: /opt/zeek/logs/current
    fallback_log_dir: /var/log/zeek/current
    max_line_bytes: 65536
rules:
  suppression_seconds: 120
  correlation_window_minutes: 10
  portscan_window_seconds: 60
  portscan_distinct_ports: 4
  burst_window_seconds: 30
  burst_events: 8
  http_path_substrings:
    - /admin
    - /login
    - phpmyadmin
    - wp-
  payload_keywords:
    - "select "
    - "union "
    - "../"
    - "cmd="
listeners:
  tcp:
    - name: ssh-decoy
      host: 0.0.0.0
      port: 12222
      mode: ssh
      banner: "SSH-2.0-OpenSSH_9.9"
    - name: telnet-decoy
      host: 0.0.0.0
      port: 12323
      mode: telnet
    - name: smtp-decoy
      host: 0.0.0.0
      port: 12525
      mode: smtp
    - name: redis-decoy
      host: 0.0.0.0
      port: 16379
      mode: redis
    - name: binary-decoy
      host: 0.0.0.0
      port: 19000
      mode: binary
      max_bytes: 2048
    - name: rdp-decoy
      host: 0.0.0.0
      port: 33890
      mode: rdp
      max_bytes: 2048
  http:
    host: 0.0.0.0
    port: 18080
    max_headers: 64
    max_body_bytes: 4096
